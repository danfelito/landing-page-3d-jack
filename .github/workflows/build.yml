name: Verify build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Verify output
        run: test -f dist/index.html
      - name: Verify Render deployment contains original portrait
        shell: bash
        run: |
          set -u
          base='https://landing-page-3d-jack.onrender.com'
          for attempt in $(seq 1 24); do
            echo "Deployment check ${attempt}/24"
            html="$(curl -fsSL --max-time 30 "$base/" || true)"
            asset="$(printf '%s' "$html" | grep -oE '/assets/index-[^" ]+\.js' | head -n 1 || true)"
            if [ -n "$asset" ]; then
              bundle="$(curl -fsSL --max-time 30 "$base$asset" || true)"
              if printf '%s' "$bundle" | grep -q 'Rectangle_40443\.81459862\.png'; then
                echo 'Render is serving the restored original portrait.'
                exit 0
              fi
            fi
            sleep 10
          done
          echo 'Render did not serve the expected portrait within the verification window.'
          exit 1
