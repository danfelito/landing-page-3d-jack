name: Integrate Circulo Bienes Raices

on:
  push:
    branches: [add-circulo-bienes-raices]
    paths:
      - .github/workflows/integrate-circulo-bienes-raices.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add project to App
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = 'src/App.tsx';
          const source = fs.readFileSync(path, 'utf8');
          const marker = `  {
              slug: 'circulo-inmobiliario',
              title: 'Círculo Inmobiliario',
              url: 'https://circulo-inmobiliario.onrender.com/',
              platform: 'Render',
              description: 'Asesoría inmobiliaria guiada para compra y renta de propiedades.',
              images: ['/projects/circulo-inmobiliario.webp?v=6'],
            },`;
          const project = `${marker}
            {
              slug: 'circulo-bienes-raices',
              title: 'Círculo Bienes Raíces',
              url: 'https://circulo-bienes-raices-1.onrender.com/',
              platform: 'Render',
              description: 'Portal inmobiliario para explorar propiedades, servicios y oportunidades de inversión.',
              images: ['/projects/circulo-bienes-raices.webp?v=1'],
              imagePosition: 'top',
            },`;
          if (!source.includes(marker)) throw new Error('No se encontró el bloque de Círculo Inmobiliario.');
          if (source.includes("slug: 'circulo-bienes-raices'")) process.exit(0);
          fs.writeFileSync(path, source.replace(marker, project));
          EOF

      - name: Commit project integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx
          git commit -m "Add Circulo Bienes Raices to portfolio"
          git push origin HEAD:add-circulo-bienes-raices
